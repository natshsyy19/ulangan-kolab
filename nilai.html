<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Nilai</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #eaf7ea;
            margin: 0;
            padding: 0;
        }

        .container{
            width: 80%;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            color: green;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td{
            border: 1px solid #000;
        }

        th, td{
            padding: 12px;
            text-align: center;
        }

        th{
            background-color: green;
            color: white;
        }

        .btn{
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover{
            background-color: darkgreen;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HALAMAN NILAI</h1>

        <table>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Nilai</th>
            </tr>

            <tr>
                <td>1</td>
                <td>Natasha</td>
                <td>90</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Izzah Syahar Tanazila</td>
                <td>85</td>
            </tr>

        </table>

        <a href="beranda.html" class="btn">Kembali ke Beranda</a>
    </div>

</body>
</html>
